<body class="bg-background text-on-background min-h-screen relative flex flex-col items-center">
<div class="w-full max-w-max-width min-h-screen bg-surface relative pb-24 shadow-2xl">

<header class="bg-secondary dark:bg-on-secondary-fixed text-primary dark:text-primary-fixed fixed top-0 w-full h-48 rounded-b-[40px] z-0 max-w-max-width">
<div class="flex justify-between items-center px-container-padding pt-8 w-full max-w-[480px] mx-auto">
<button aria-label="Menu" class="w-10 h-10 flex items-center justify-center text-on-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[24px]">menu</span>
</button>
<h1 class="text-headline-md font-headline-md font-black text-on-primary text-center absolute left-1/2 -translate-x-1/2">Thực Đơn</h1>
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-on-primary/20 flex-shrink-0">

</div>
</div>
</header>

<div class="flex items-center space-x-2 overflow-x-auto hide-scrollbar pb-2">
<button class="flex-shrink-0 bg-primary-container text-on-primary px-6 py-2 rounded-full text-label-caps font-label-caps whitespace-nowrap shadow-sm hover:opacity-90 transition-opacity active:scale-95">Món Chính</button>
<button class="flex-shrink-0 bg-surface-container text-on-surface-variant px-6 py-2 rounded-full text-label-caps font-label-caps whitespace-nowrap hover:bg-surface-container-highest transition-colors active:scale-95">Đồ Uống</button>
<button class="flex-shrink-0 bg-surface-container text-on-surface-variant px-6 py-2 rounded-full text-label-caps font-label-caps whitespace-nowrap hover:bg-surface-container-highest transition-colors active:scale-95">Ăn Vặt</button>
</div>
<!-- Menu Items List -->
<div class="flex flex-col gap-4 mt-2">
<!-- Item 1 -->
<div class="flex items-center p-3 rounded-2xl bg-surface hover:bg-surface-container-low transition-colors border border-surface-variant group">
<div class="w-16 h-16 rounded-xl overflow-hidden flex-shrink-0 bg-surface-container">

<p class="text-body-sm font-body-sm text-primary-container font-bold mt-1">25.000đ</p>
</div>
<div class="flex space-x-2 opacity-80 group-hover:opacity-100 transition-opacity">
<button class="w-8 h-8 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant hover:bg-surface-container-highest active:scale-90 transition-all">
<span class="material-symbols-outlined text-[18px]">edit</span>
</button>
<button class="w-8 h-8 rounded-full bg-error-container text-error flex items-center justify-center hover:bg-[#ffb4ab] active:scale-90 transition-all">
<span class="material-symbols-outlined text-[18px]">delete</span>
</button>
</div>
</div>
<!-- Item 2 -->
<div class="flex items-center p-3 rounded-2xl bg-surface hover:bg-surface-container-low transition-colors border border-surface-variant group">

<img alt="Cơm Tấm Sườn Bì" class="w-full h-full object-cover" data-alt="A delicious, high-quality photograph of a plate of Vietnamese Com Tam (Broken Rice) topped with a perfectly grilled pork chop, shredded pork skin, and a fried egg. The dish is presented on a minimalist white plate against a clean, light surface. The lighting is high-key and appetizing, emphasizing the rich, savory tones of the meat. The aesthetic perfectly matches a modern, energetic food ordering interface." src="https://lh3.googleusercontent.com/aida/ADBb0ugmsX4D8RcMWo_XOMpeD_SW6wbDtuhBJOkhBp48r6bc9ZY6TS_XDMc8cbiGTJ_Pwc6VSchZJ0qiiORT7jBWiwxAH36seAebxFLGgzcClC5AQqvpE1ZHqfaEsCWGHC7OGu3KsalBKsWiOpGYQELsO1wae0LyvcpIksExnEs6FFzDruTPaufa_p1RLh3AdPvY84Jitsc9YAj_4ENSVytmb1HBrby7qQr4yUGK5nsXNqHY_J7I1bxbXIsAj1cJtwfEpWOevMqCaaCVew"/>
</div>
<div class="ml-4 flex-grow">
<h3 class="text-body-lg font-body-lg font-semibold text-on-surface">Cơm Tấm Sườn Bì</h3>
<p class="text-body-sm font-body-sm text-primary-container font-bold mt-1">35.000đ</p>
</div>
<div class="flex space-x-2 opacity-80 group-hover:opacity-100 transition-opacity">
<button class="w-8 h-8 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant hover:bg-surface-container-highest active:scale-90 transition-all">
<span class="material-symbols-outlined text-[18px]">edit</span>
</button>
<button class="w-8 h-8 rounded-full bg-error-container text-error flex items-center justify-center hover:bg-[#ffb4ab] active:scale-90 transition-all">
<span class="material-symbols-outlined text-[18px]">delete</span>
</button>
</div>
</div>
<!-- Item 3 -->
<div class="flex items-center p-3 rounded-2xl bg-surface hover:bg-surface-container-low transition-colors border border-surface-variant group">

<img alt="Bún Bò Huế" class="w-full h-full object-cover" data-alt="A steamy, vibrant bowl of Bun Bo Hue, a spicy Vietnamese beef noodle soup, served in a modern ceramic bowl. The broth is a rich, fiery orange, garnished with fresh green scallions and herbs. The bowl sits on a pristine, bright background. The high-contrast lighting makes the colors pop, creating intense appetite appeal suitable for a sleek, contemporary food app designed for students." src="https://lh3.googleusercontent.com/aida/ADBb0uhreCsWB55Tm_NkxFRXgnGZdaeFDLZ6xkdxgHVkm7hfrpbaf9RcurKEXJPPLXm4ZJABOTF00Ry1m-HcatxDD7p5NuAoh94jUyFspB37OXXNi9yrwPDM-5xj24TO9pBe4_rGxiP5OVKVwjfriyuRgZ_HT5cJ93CXFgiLn_L647Y7sZJUi2b2bGKhzVV7iA8apXelsH7q2MSN1LU-e0Xr_aXkfXyzu80emz5wJJtdiQA6cZiqXtV3glKHmXwjtdFriwWhMo5m-90CxJo"/>
</div>
<div class="ml-4 flex-grow">
<h3 class="text-body-lg font-body-lg font-semibold text-on-surface">Bún Bò Huế</h3>
<p class="text-body-sm font-body-sm text-primary-container font-bold mt-1">40.000đ</p>
</div>
<div class="flex space-x-2 opacity-80 group-hover:opacity-100 transition-opacity">
<button class="w-8 h-8 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant hover:bg-surface-container-highest active:scale-90 transition-all">
<span class="material-symbols-outlined text-[18px]">edit</span>
</button>
<button class="w-8 h-8 rounded-full bg-error-container text-error flex items-center justify-center hover:bg-[#ffb4ab] active:scale-90 transition-all">
<span class="material-symbols-outlined text-[18px]">delete</span>
</button>
</div>
</div>
</div>
</div>

<!-- Floating Action Button (FAB) -->
<button class="absolute bottom-24 right-6 w-14 h-14 bg-primary-container text-on-primary rounded-2xl shadow-lg flex items-center justify-center hover:opacity-90 active:scale-90 transition-all z-40">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">add</span>
</button>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] bg-surface dark:bg-surface-container-lowest z-50 rounded-t-xl shadow-[0_-4px_20px_0_rgba(0,0,0,0.08)]">

<span class="text-[10px] font-bold tracking-wide">Orders</span>
</button>
<!-- Menu (Active) -->
<button class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-4 py-1 hover:bg-surface-container-high transition-colors active:scale-90 duration-200">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">restaurant_menu</span>
<span class="text-[10px] font-bold tracking-wide text-primary">Menu</span>
</button>
<!-- Shop (Inactive) -->
<button class="flex flex-col items-center justify-center text-tertiary hover:bg-surface-container-high transition-colors active:scale-90 duration-200 w-16 h-12 rounded-xl">
<span class="material-symbols-outlined mb-1">storefront</span>
<span class="text-[10px] font-bold tracking-wide">Shop</span>
</button>
<!-- Stats (Inactive) -->
<button class="flex flex-col items-center justify-center text-tertiary hover:bg-surface-container-high transition-colors active:scale-90 duration-200 w-16 h-12 rounded-xl">
<span class="material-symbols-outlined mb-1">monitoring</span>
<span class="text-[10px] font-bold tracking-wide">Stats</span>
</button>
</div>
</nav>
</div>
