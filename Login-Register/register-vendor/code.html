<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registration - UniEats</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "primary-fixed-dim": "#ffb690",
                        "tertiary": "#515f74",
                        "surface": "#f8f9fa",

                        "on-primary-container": "#582200",
                        "on-secondary-container": "#5a627e",

                        "surface-container-highest": "#e1e3e4",
                        "secondary": "#565d79",
                        "on-secondary-fixed-variant": "#3e4660",
                        "primary-container": "#f97316",
                        "surface-variant": "#e1e3e4",
                        "surface-dim": "#d9dadb",
                        "surface-container": "#edeeef",
                        "error-container": "#ffdad6",
                        "surface-bright": "#f8f9fa",
                        "secondary-fixed-dim": "#bec5e5",
                        "secondary-fixed": "#dbe1ff",
                        "on-tertiary-fixed": "#0d1c2f",
                        "outline": "#8c7164",
                        "surface-container-low": "#f3f4f5",
                        "primary-fixed": "#ffdbca",
                        "tertiary-container": "#8d9bb2",
                        "outline-variant": "#e0c0b1",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed": "#341100",
                        "on-background": "#191c1d",
                        "primary": "#9d4300",
                        "on-tertiary-container": "#253346",
                        "inverse-surface": "#2e3132",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#d8deff",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",

                    },
                    "spacing": {
                        "section-margin": "32px",
                        "max-width": "480px",
                        "container-padding": "24px",
                        "stack-gap": "16px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "display-lg": ["Inter"],
                        "label-caps": ["Inter"]

                    "fontSize": {
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .soft-shadow {
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>
<body class="bg-background font-body-lg text-body-lg text-on-surface antialiased flex justify-center w-full min-h-screen">
<div class="w-full max-w-max-width bg-background min-h-screen relative shadow-2xl overflow-hidden flex flex-col">
<!-- Header Section -->
<div class="bg-on-secondary-fixed rounded-b-[40px] pt-12 pb-24 px-container-padding relative z-0 flex-shrink-0">
<div class="flex items-center gap-4 text-on-primary">
<button aria-label="Go back" class="p-2 -ml-2 rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-display-lg text-display-lg">Đăng Ký Tài Khoản</h1>
</div>
<!-- Decorative Elements -->
<div class="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full blur-2xl -translate-y-1/2 translate-x-1/2 pointer-events-none"></div>
<div class="absolute bottom-0 left-0 w-24 h-24 bg-primary-container/20 rounded-full blur-xl translate-y-1/2 -translate-x-1/2 pointer-events-none"></div>
</div>
<!-- Main Content Canvas -->
<main class="flex-grow px-container-padding -mt-16 z-10 pb-section-margin relative">
<div class="bg-surface-container-lowest rounded-[32px] p-container-padding soft-shadow w-full">
<!-- Segmented Control -->
<div class="bg-surface-container-low rounded-full p-1 flex items-center mb-section-margin relative">
<button aria-pressed="false" class="flex-1 py-2 text-center rounded-full font-headline-md text-body-sm text-on-surface-variant transition-colors">Sinh viên</button>
<button aria-pressed="true" class="flex-1 py-2 text-center rounded-full bg-surface-container-lowest font-headline-md text-body-sm text-on-surface shadow-sm transition-colors">Chủ quán</button>
</div>
<!-- Registration Form -->
<form class="space-y-stack-gap">
<!-- Basic Info -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps uppercase text-on-surface" for="fullName">Full Name</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline" data-icon="person">person</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-3 pl-10 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary-container transition-all" id="fullName" placeholder="Nhập họ và tên" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps uppercase text-on-surface" for="email">Email</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-3 pl-10 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary-container transition-all" id="email" placeholder="Nhập địa chỉ email" type="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps uppercase text-on-surface" for="phone">Phone Number</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline" data-icon="phone">phone</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-3 pl-10 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary-container transition-all" id="phone" placeholder="Nhập số điện thoại" type="tel"/>
</div>
</div>
<!-- Vendor Specific Fields (Active) -->
<div class="pt-4 border-t border-surface-variant space-y-stack-gap">
<h2 class="font-headline-md text-headline-md text-on-surface">Thông tin cửa hàng</h2>
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps uppercase text-on-surface" for="shopName">Tên Cửa Hàng</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline" data-icon="store">store</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-3 pl-10 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary-container transition-all" id="shopName" placeholder="Tên cửa hàng của bạn" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps uppercase text-on-surface" for="description">Mô tả</label>
<div class="relative flex items-start">
<span class="material-symbols-outlined absolute left-3 top-3 text-outline" data-icon="description">description</span>
<textarea class="w-full bg-surface-container-low border-none rounded-xl py-3 pl-10 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary-container transition-all resize-none" id="description" placeholder="Giới thiệu ngắn về cửa hàng..." rows="3"></textarea>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps uppercase text-on-surface" for="openTime">Giờ mở cửa</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline" data-icon="schedule">schedule</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-3 pl-10 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary-container transition-all" id="openTime" type="time"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps uppercase text-on-surface" for="closeTime">Giờ đóng cửa</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline" data-icon="schedule">schedule</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-3 pl-10 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary-container transition-all" id="closeTime" type="time"/>
</div>
</div>
</div>
</div>
<!-- Security -->
<div class="pt-4 border-t border-surface-variant space-y-stack-gap">
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps uppercase text-on-surface" for="password">Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-3 pl-10 pr-10 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary-container transition-all" id="password" placeholder="Tạo mật khẩu" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps uppercase text-on-surface" for="confirmPassword">Confirm Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-3 pl-10 pr-10 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary-container transition-all" id="confirmPassword" placeholder="Nhập lại mật khẩu" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="w-full mt-section-margin bg-primary-container text-white font-headline-md text-headline-md py-4 rounded-xl hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        ĐĂNG KÝ
                        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="text-center font-body-sm text-body-sm text-on-surface-variant mt-4">
                        Đã có tài khoản? <a class="text-primary-container font-headline-md hover:underline" href="#">Đăng nhập</a>
</p>
</form>
</div>
</main>

</div>
</div>
</body></html>
