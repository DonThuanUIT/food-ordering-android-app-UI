<style>

            background-color: #f8f9fa; /* using raw hex for root background as fallback, though classes will cover it */
        }
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background-color: #f8f9fa;
            position: relative;
            overflow-x: hidden;
            padding-bottom: 80px; /* space for bottom nav */
        }
        
        /* Custom Header Background Color */
        .bg-navy-header {
            background-color: #0B132B;
        }
        
        /* Soft ambient shadow for main card */
        .shadow-ambient {
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.08);
        }

</div>

<div class="bg-surface-container-lowest rounded-3xl mx-4 -mt-16 relative z-10 shadow-ambient overflow-hidden min-h-[500px]">

<div class="sticky top-0 bg-surface-container-lowest/90 backdrop-blur-md border-b border-surface-variant z-20 px-container-padding pt-4">
<div class="flex gap-8">
<button class="relative pb-4 font-headline-md text-headline-md text-primary-container">

</button>
<button class="relative pb-4 font-headline-md text-headline-md text-on-surface-variant hover:text-on-surface transition-colors">
                    Món Ngon

</div>
</div>
<!-- Shop List Content -->

</div>
<div class="flex items-center gap-1 bg-surface-container px-2 py-1 rounded-lg">

<span class="material-symbols-outlined text-[16px] text-primary-container" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-label-caps text-label-caps text-on-surface">4.5</span>

<div class="flex justify-between items-start">

<span class="material-symbols-outlined text-[16px] text-primary-container" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-label-caps text-label-caps text-on-surface">4.9</span>
</div>
</div>
<div class="flex justify-between items-start">
<div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-1">Bánh Mì Chảo Cô Quyên</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant">Bánh Mì/Bread • Sắp đóng cửa</p>

<div class="flex items-center gap-1 bg-surface-container px-2 py-1 rounded-lg">
<span class="material-symbols-outlined text-[16px] text-on-surface-variant">schedule</span>

</div>
</div>
</div>
</div>

<nav class="fixed bottom-0 w-full max-w-[480px] z-50 flex justify-around items-center px-4 py-2 bg-surface dark:bg-surface-dim shadow-lg rounded-t-xl" style="box-shadow: 0 -4px 20px rgba(0,0,0,0.05);">

<span class="material-symbols-outlined">person</span>
<span class="font-label-md text-label-md mt-1 text-[10px] font-semibold">Profile</span>
